name: Custom Update and Deploy

on:
  workflow_dispatch:
    inputs:
      sync_upstream:
        description: "Merge upstream (fosrl/main) into fork/main"
        required: true
        default: true
        type: boolean
      sync_license_key:
        description: "Patch license.ts with LICENSE_PUBLIC_KEY secret"
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: https://github.com/fosrl/pangolin.git

jobs:
  update-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        if: inputs.sync_upstream
        run: |
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || true
          git fetch upstream main
          git checkout main
          git merge --no-edit upstream/main || true

          if git status | grep -q "both modified\|UU"; then
            echo "Conflicts detected, resolving with ours..."
            for f in README.md .gitignore server/private/license/license.ts; do
              if git status "$f" 2>/dev/null | grep -q "both modified"; then
                echo "Keeping ours: $f"
                git checkout --ours "$f"
                git add "$f"
              fi
            done
            if git status | grep -q "both modified"; then
              echo "ERROR: Unresolved conflicts remain:"
              git status --short
              exit 1
            fi
            git commit -m "Merge upstream fosrl/main - keep custom files (ours)"
          fi

      - name: Patch license.ts from secret
        if: inputs.sync_license_key
        env:
          LICENSE_PUBLIC_KEY: ${{ secrets.LICENSE_PUBLIC_KEY }}
        run: |
          echo "${LICENSE_PUBLIC_KEY}" > /tmp/public.pem
          python3 - << 'PY'
          import pathlib, re

          license_path = pathlib.Path("server/private/license/license.ts")
          content = license_path.read_text(encoding="utf-8")
          key = pathlib.Path("/tmp/public.pem").read_text(encoding="utf-8").strip()

          server_url_re = re.compile(r'private serverBaseUrl\s*=\s*["\'].*?["\'];', re.MULTILINE)
          server_url_repl = (
              'private serverBaseUrl =\n'
              '        process.env.PANGOLIN_LICENSE_SERVER_URL || "http://license-server:3456";'
          )
          public_key_re = re.compile(
              r'private publicKey = `-----BEGIN PUBLIC KEY-----.*?-----END PUBLIC KEY-----`;',
              re.DOTALL,
          )

          new_content = server_url_re.sub(server_url_repl, content)
          new_content = public_key_re.sub(f"private publicKey = `{key}`;", new_content)

          if new_content != content:
              license_path.write_text(new_content, encoding="utf-8")
              print("license.ts patched successfully")
          else:
              print("license.ts already up to date")
          PY

      - name: Commit and push updates
        run: |
          git checkout main
          if ! git diff --quiet; then
            git add .
            git commit -m "chore: upstream sync + license key patch"
          else
            echo "No changes to commit"
          fi
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push origin main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pangolin-custom image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BUILD=enterprise
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push pangolin-license-server image
        uses: docker/build-push-action@v5
        with:
          context: ./license-server
          file: ./license-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/license-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/license-server:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
